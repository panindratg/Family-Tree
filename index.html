let collapsed=new Set(),selectedId=null,ctxId=null,formMode=null,formTarget=null;
let panX=80,panY=60,scale=0.35,isPanning=false,panStart=null;
let navGF='all',navGN='all';

const isPR=r=>r.type==='parent'||r.type==='adopted';
const gCh=id=>{const s=new Set();relations.filter(r=>isPR(r)&&r.parent===id).forEach(r=>s.add(r.child));return[...s]};
const gPa=id=>relations.filter(r=>isPR(r)&&r.child===id).map(r=>r.parent);
const gSp=id=>{const s=new Set();relations.filter(r=>r.type==='spouse'&&(r.a===id||r.b===id)).forEach(r=>s.add(r.a===id?r.b:r.a));return[...s]};
const byId=id=>people.find(p=>p.id===id);

function famCh(id){const k=new Set();gCh(id).forEach(c=>k.add(c));gSp(id).forEach(s=>gCh(s).forEach(c=>k.add(c)));return[...k]}
function cardW(n){return Math.max(90,n.length*9.5+32)}
const CH=36,VG=120,HG=35;

function computeLayout(){
  function pp(cid){const p=gPa(cid);if(!p.length)return null;const lp=p.find(pid=>gPa(pid).length>0);if(lp)return lp;return p.reduce((a,b)=>gCh(a).length>=gCh(b).length?a:b)}
  function ok(id){const all=famCh(id),seen=new Set();return all.filter(c=>{if(seen.has(c))return false;seen.add(c);return pp(c)===id})}
  function uw(id){const p=byId(id);if(!p)return 100;let w=cardW(p.name);gSp(id).forEach(s=>{const sp=byId(s);if(sp)w+=HG+cardW(sp.name)});return w+HG}
  const memo={};
  function stw(id,d){if(d===undefined)d=0;if(memo[id]!==undefined)return memo[id];if(d>50)return uw(id);const k=collapsed.has(id)?[]:ok(id);const u=uw(id);if(!k.length){memo[id]=u;return u}const kw=k.reduce((s,c)=>s+stw(c,d+1),0);memo[id]=Math.max(u,kw);return memo[id]}
  const pos={};
  function placeU(id,cx,gen){
    if(pos[id])return;const p=byId(id);if(!p)return;
    const sp=gSp(id).filter(s=>!pos[s]).map(s=>byId(s)).filter(Boolean);
    let tw=cardW(p.name);sp.forEach(s=>{tw+=HG+cardW(s.name)});
    let x=cx-tw/2;pos[id]={x:x+cardW(p.name)/2,y:gen*VG+70};x+=cardW(p.name)+HG;
    sp.forEach(s=>{pos[s.id]={x:x+cardW(s.name)/2,y:gen*VG+70};x+=cardW(s.name)+HG})
  }
  function place(id,gen,cx,d){
    if(d===undefined)d=0;if(pos[id]||d>50)return;
    const k=collapsed.has(id)?[]:ok(id);
    if(!k.length){placeU(id,cx,gen);return}
    const tkw=k.reduce((s,c)=>s+stw(c,d+1),0);let l=cx-tkw/2;
    k.forEach(c=>{const sw=stw(c,d+1);place(c,gen+1,l+sw/2,d+1);l+=sw});
    const cxs=k.filter(c=>pos[c]).map(c=>pos[c].x);
    const mid=cxs.length?(Math.min(...cxs)+Math.max(...cxs))/2:cx;
    placeU(id,mid,gen)
  }
  const roots=people.filter(p=>!gPa(p.id).length);const hd=new Set();
  const leads=roots.filter(r=>{if(hd.has(r.id))return false;const rv=gSp(r.id).filter(s=>roots.find(x=>x.id===s));if(rv.some(s=>famCh(s).length>famCh(r.id).length)){hd.add(r.id);return false}rv.forEach(s=>hd.add(s));return true});
  let cur=80;leads.forEach(r=>{const sw=stw(r.id);place(r.id,r.generation||0,cur+sw/2);cur+=sw+20});
  people.forEach(p=>{if(pos[p.id])return;const sp=gSp(p.id).find(s=>pos[s]);if(sp){const s=pos[sp];pos[p.id]={x:s.x+cardW(byId(sp).name)/2+HG+cardW(p.name)/2,y:s.y}}else{pos[p.id]={x:cur+cardW(p.name)/2,y:(p.generation||0)*VG+70};cur+=cardW(p.name)+HG}});
  return pos
}

function render(){
  const pos=computeLayout(),layer=document.getElementById('cl'),svg=document.getElementById('sg');
  layer.innerHTML='';svg.innerHTML='';
  // Spouse lines
  const ds=new Set();
  relations.forEach(r=>{if(r.type!=='spouse')return;const k=[r.a,r.b].sort().join('-');if(ds.has(k))return;ds.add(k);
    const pa=pos[r.a],pb=pos[r.b];if(!pa||!pb)return;const pA=byId(r.a),pB=byId(r.b);if(!pA||!pB)return;
    const ha=cardW(pA.name)/2*scale,hb=cardW(pB.name)/2*scale;
    const ax=pa.x*scale+panX,bx=pb.x*scale+panX,ay=pa.y*scale+panY,by=pb.y*scale+panY;
    let x1,x2;if(ax<bx){x1=ax+ha;x2=bx-hb}else{x1=ax-ha;x2=bx+hb}
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',ay);l.setAttribute('x2',x2);l.setAttribute('y2',by);l.setAttribute('class','ls');svg.appendChild(l);
    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',(x1+x2)/2);dot.setAttribute('cy',(ay+by)/2);dot.setAttribute('r',2*scale);dot.setAttribute('class','sd');svg.appendChild(dot)});
  // Parent lines
  relations.forEach(r=>{if(!isPR(r)||collapsed.has(r.parent))return;const a=pos[r.parent],b=pos[r.child];if(!a||!b)return;
    const ax=a.x*scale+panX,ay=(a.y+CH/2)*scale+panY,bx=b.x*scale+panX,by=(b.y-CH/2)*scale+panY,my=(ay+by)/2;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${ax},${ay} C${ax},${my} ${bx},${my} ${bx},${by}`);
    p.setAttribute('class','lp'+(selectedId===r.parent||selectedId===r.child?' hi':''));svg.appendChild(p)});
  // Cards
  people.forEach(p=>{const pp=pos[p.id];if(!pp)return;const cw=cardW(p.name)*scale;
    const x=pp.x*scale+panX,y=pp.y*scale+panY;
    const g=p.gender==='m'?'gm':p.gender==='f'?'gf':'gu';
    const d=document.createElement('div');d.className='pc '+g+(selectedId===p.id?' sel':'');
    d.style.left=x+'px';d.style.top=y+'px';d.style.width=cw+'px';
    d.style.transform=`translate(-50%,-50%) scale(${scale})`;d.style.transformOrigin='center';d.dataset.id=p.id;
    const hk=famCh(p.id).length>0;
    d.innerHTML=`<div class="cn">${p.name}</div>`+(hk?`<div class="tg" data-t="${p.id}">${collapsed.has(p.id)?'&#9656;':'&#9662;'}</div>`:'');
    d.addEventListener('click',e=>{if(e.target.dataset.t){toggleC(e.target.dataset.t);return}e.stopPropagation();openCtx(p.id,e.clientX,e.clientY)});
    layer.appendChild(d)});
  renderNav()
}
function toggleC(id){collapsed.has(id)?collapsed.delete(id):collapsed.add(id);render()}

// Nav
function renderNav(){
  const list=document.getElementById('nl'),q=(document.getElementById('ns').value||'').toLowerCase().trim();
  document.getElementById('nc').textContent=people.length;
  const gs=document.getElementById('gf2'),cv=gs.value;
  const gn=['Gen 0','Gen I','Gen II','Gen III','Gen IV','Gen V','Gen VI','Gen VII','Gen VIII','Gen IX','Gen X','Gen XI'];
  const genSet=new Set(people.map(p=>p.generation||0));
  gs.innerHTML='<option value="all">All Generations</option>';
  [...genSet].sort((a,b)=>a-b).forEach(g=>{gs.innerHTML+=`<option value="${g}" ${cv==g?'selected':''}>${gn[g]||'Gen '+g}</option>`});
  const gens={};
  people.forEach(p=>{if(q&&!p.name.toLowerCase().includes(q))return;if(navGF!=='all'&&p.gender!==navGF)return;if(navGN!=='all'&&(p.generation||0)!==parseInt(navGN))return;const g=p.generation||0;if(!gens[g])gens[g]=[];gens[g].push(p)});
  let h='';Object.keys(gens).sort((a,b)=>a-b).forEach(g=>{h+=`<div class="ng">${gn[+g]||'Gen '+g} \u00b7 ${gens[g].length}</div>`;gens[g].forEach(p=>{h+=`<div class="ni${selectedId===p.id?' a':''}" onclick="navGo('${p.id}')"><div class="nd ${p.gender==='m'?'m':p.gender==='f'?'f':'u'}"></div><span class="nn">${p.name}</span></div>`})});
  if(!h)h='<div style="padding:20px 12px;color:var(--ikd);font-size:.78rem">No matches</div>';list.innerHTML=h
}
document.getElementById('ns').addEventListener('input',()=>{renderNav();const q=document.getElementById('ns').value.toLowerCase().trim();document.querySelectorAll('.pc').forEach(c=>{const p=byId(c.dataset.id);!q?c.classList.remove('lit'):p&&p.name.toLowerCase().includes(q)?c.classList.add('lit'):c.classList.remove('lit')})});
document.getElementById('gf2').addEventListener('change',e=>{navGN=e.target.value;renderNav()});
document.querySelectorAll('#gfl .fb').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('#gfl .fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');navGF=b.dataset.g;renderNav()})});
function navGo(id){selectedId=id;const pos=computeLayout(),pp=pos[id];if(pp){const w=document.getElementById('cw');panX=w.clientWidth/2-pp.x*scale;panY=w.clientHeight/2-pp.y*scale}render()}

// Context menu
function openCtx(id,cx,cy){ctxId=id;selectedId=id;render();const m=document.getElementById('ctx');document.getElementById('ch').textContent=byId(id).name;m.classList.add('op');m.style.left=Math.min(cx+4,innerWidth-180)+'px';m.style.top=Math.min(cy+4,innerHeight-220)+'px'}
function closeCtx(){document.getElementById('ctx').classList.remove('op')}
document.addEventListener('click',e=>{if(!e.target.closest('#ctx'))closeCtx()});
function ctxEdit(){closeCtx();openForm(ctxId,'edit')}function ctxSpouse(){closeCtx();openForm(ctxId,'spouse')}
function ctxChild(){closeCtx();openForm(ctxId,'child')}function ctxParent(){closeCtx();openForm(ctxId,'parent')}
function ctxView(){closeCtx();openDet(ctxId)}
function ctxDel(){const p=byId(ctxId);if(!confirm('Remove "'+p.name+'"?'))return;closeCtx();people=people.filter(x=>x.id!==ctxId);relations=relations.filter(r=>r.parent!==ctxId&&r.child!==ctxId&&r.a!==ctxId&&r.b!==ctxId);selectedId=null;render();saveData();toast(p.name+' removed')}

// Form
function openForm(id,mode){formMode=mode;formTarget=id;const rs=document.getElementById('frs');
  document.getElementById('ft').textContent={edit:'Edit',child:'Add Child',spouse:'Add Spouse',parent:'Add Parent',new:'Add Person'}[mode]||'Add';
  document.getElementById('fsb').textContent=mode==='edit'?'Save':'Add';
  if(mode==='edit'){const p=byId(id);document.getElementById('fn').value=p.name||'';document.getElementById('fg').value=p.gender||'m';document.getElementById('fb').value=p.birth||'';document.getElementById('fd').value=p.death||'';document.getElementById('fo2').value=p.occ||'';document.getElementById('fp').value=p.place||'';document.getElementById('fno').value=p.notes||'';rs.style.display='none'}
  else{['fn','fb','fd','fo2','fp','fno'].forEach(i=>document.getElementById(i).value='');document.getElementById('fg').value='m';rs.style.display='';const s=document.getElementById('frw');s.innerHTML=people.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');if(id)s.value=id;document.getElementById('frt').value={child:'child',spouse:'spouse',parent:'parent',new:'child'}[mode]||'child'}
  document.getElementById('fo').classList.add('op');setTimeout(()=>document.getElementById('fn').focus(),80)}
function closeForm(){document.getElementById('fo').classList.remove('op')}
function submitForm(){const name=document.getElementById('fn').value.trim();if(!name){toast('Enter a name','w');return}
  const gender=document.getElementById('fg').value,birth=parseInt(document.getElementById('fb').value)||null,death=parseInt(document.getElementById('fd').value)||null,occ=document.getElementById('fo2').value.trim(),place=document.getElementById('fp').value.trim(),notes=document.getElementById('fno').value.trim();
  if(formMode==='edit'){Object.assign(byId(formTarget),{name,gender,birth,death,occ,place,notes});closeForm();render();saveData();toast(name+' updated','ok');return}
  const rt=document.getElementById('frt').value,rw=document.getElementById('frw').value,tgt=byId(rw);
  const gen=tgt?(rt==='child'?tgt.generation+1:rt==='parent'?tgt.generation-1:tgt.generation):0;
  const nid='p'+Date.now();people.push({id:nid,name,gender,birth,death,occ,place,notes,generation:gen});
  if(rw){if(rt==='child')relations.push({type:'parent',parent:rw,child:nid});else if(rt==='parent')relations.push({type:'parent',parent:nid,child:rw});else relations.push({type:'spouse',a:rw,b:nid})}
  closeForm();render();saveData();toast(name+' added','ok');setTimeout(()=>{selectedId=nid;render()},50)}

// Detail
function openDet(id){const p=byId(id);if(!p)return;document.getElementById('dtn').textContent=p.name;
  const yr=p.birth?(p.death?p.birth+'\u2013'+p.death:'b. '+p.birth):'';document.getElementById('dts').textContent=yr+(p.occ?' \u00b7 '+p.occ:'');
  const sp=gSp(id),pa=gPa(id),ch=famCh(id);let h='';
  if(p.place)h+=`<div class="ds"><div class="dl">Place</div><div class="dv">${p.place}</div></div>`;
  if(p.notes)h+=`<div class="ds"><div class="dl">Notes</div><div class="dv">${p.notes}</div></div>`;h+='<div class="dd"></div>';
  if(pa.length)h+=`<div class="ds"><div class="dl">Parents</div>${pa.map(x=>mkCh(x,'#5a8a60')).join('')}</div>`;
  if(sp.length)h+=`<div class="ds"><div class="dl">${sp.length>1?'Spouses':'Spouse'}</div>${sp.map(x=>mkCh(x,'#8a5868')).join('')}</div>`;
  if(ch.length)h+=`<div class="ds"><div class="dl">Children \u00b7 ${ch.length}</div>${ch.map(x=>mkCh(x,'#6a5838')).join('')}</div>`;
  document.getElementById('dtb').innerHTML=h;document.getElementById('det').classList.add('op')}
function mkCh(id,c){const p=byId(id);if(!p)return'';return`<div class="ch" onclick="navGo('${id}');closeDet()"><div class="dt" style="background:${c}"></div>${p.name}</div>`}
function closeDet(){document.getElementById('det').classList.remove('op');selectedId=null;render()}

// Pan & Zoom
const wrap=document.getElementById('cw');
wrap.addEventListener('mousedown',e=>{if(e.target.closest('.pc')||e.target.closest('#det')||e.target.closest('#ctx'))return;isPanning=true;panStart={x:e.clientX-panX,y:e.clientY-panY};wrap.style.cursor='grabbing'});
window.addEventListener('mousemove',e=>{if(!isPanning)return;panX=e.clientX-panStart.x;panY=e.clientY-panStart.y;render()});
window.addEventListener('mouseup',()=>{isPanning=false;wrap.style.cursor='default'});
wrap.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?.92:1.08,r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;panX=mx+(panX-mx)*d;panY=my+(panY-my)*d;scale=Math.max(.08,Math.min(2.5,scale*d));render()},{passive:false});
let lt=null;wrap.addEventListener('touchstart',e=>{if(e.touches.length===1)lt={x:e.touches[0].clientX,y:e.touches[0].clientY}});
wrap.addEventListener('touchmove',e=>{if(e.touches.length===1&&lt){panX+=e.touches[0].clientX-lt.x;panY+=e.touches[0].clientY-lt.y;lt={x:e.touches[0].clientX,y:e.touches[0].clientY};render()}});
function zoomBtn(f){const cw=wrap.clientWidth/2,ch=wrap.clientHeight/2;panX=cw+(panX-cw)*f;panY=ch+(panY-ch)*f;scale=Math.max(.08,Math.min(2.5,scale*f));render()}
function resetView(){const pos=computeLayout(),xs=Object.values(pos).map(p=>p.x),ys=Object.values(pos).map(p=>p.y);
  if(!xs.length){panX=80;panY=60;scale=.5;render();return}
  const mnx=Math.min(...xs)-80,mxx=Math.max(...xs)+80,mny=Math.min(...ys)-50,mxy=Math.max(...ys)+50;
  const w=wrap.clientWidth,h=wrap.clientHeight,sw=w/(mxx-mnx),sh=h/(mxy-mny);
  scale=Math.min(sw,sh,1);scale=Math.max(.08,scale);panX=(w-((mnx+mxx)*scale))/2;panY=(h-((mny+mxy)*scale))/2;render()}

// Export
function openExport(){let c='let people=[\\n';people.forEach((p,i)=>{const n=p.name.replace(/'/g,"\\\\'"),o=(p.occ||'').replace(/'/g,"\\\\'"),pl=(p.place||'').replace(/'/g,"\\\\'"),no=(p.notes||'').replace(/'/g,"\\\\'");c+=`  {id:'${p.id}',name:'${n}',gender:'${p.gender}',birth:${p.birth||'null'},death:${p.death||'null'},occ:'${o}',place:'${pl}',notes:'${no}',generation:${p.generation||0}}${i<people.length-1?',':''}\\n`});
  c+='];  // END PEOPLE\\n\\nlet relations=[\\n';relations.forEach((r,i)=>{if(r.type==='spouse')c+=`  {type:'spouse',a:'${r.a}',b:'${r.b}'}${i<relations.length-1?',':''}\\n`;else c+=`  {type:'${r.type}',parent:'${r.parent}',child:'${r.child}'}${i<relations.length-1?',':''}\\n`});
  c+='];  // END RELATIONS';document.getElementById('etxt').value=c;document.getElementById('expo').classList.add('op')}
function closeExport(){document.getElementById('expo').classList.remove('op')}
function copyExport(){const t=document.getElementById('etxt');t.select();t.setSelectionRange(0,99999);navigator.clipboard.writeText(t.value).then(()=>toast('Copied!','ok')).catch(()=>{document.execCommand('copy');toast('Copied!','ok')})}

// Save/Load
const SK='talagunda_v4';
function saveData(){try{localStorage.setItem(SK,JSON.stringify({people,relations}));return true}catch(e){return false}}
function loadData(){try{const r=localStorage.getItem(SK);if(!r)return false;const d=JSON.parse(r);if(d.people&&d.relations){people=d.people;relations=d.relations;return true}}catch(e){}return false}
function saveAndToast(){toast(saveData()?'Saved':'Error',saveData()?'ok':'w')}
function clearSave(){if(!confirm('Reset? All changes lost.'))return;localStorage.removeItem(SK);location.reload()}
function toast(m,t){document.querySelectorAll('.toast').forEach(x=>x.remove());const d=document.createElement('div');d.className='toast'+(t?' '+t:'');d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2500)}

const had=loadData();resetView();if(had)setTimeout(()=>toast('Loaded \u00b7 '+people.length+' people','ok'),400);

</script>
</body>
</html>
